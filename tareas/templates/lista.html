<!DOCTYPE html>
<html>
<head>
    <title>Lista de tareas</title>
</head>
<body>
    <h1>Mis tareas</h1>

    <p>Hola {{ request.user.username }}</p>

    <a href="/logout/">Cerrar sesión</a>

    <ul>
        {% for tarea in tareas %}
            <li>{{ tarea }}</li>
        {% empty %}
            <li>No hay tareas.</li>
        {% endfor %}
    </ul>
</body>
</html>
